jarvis:
  name: Jarvis
  version: "1.0.0"
  wake_word: "jarvis"

ai:
  provider: ollama
  model: mistral
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 2000
  fallback_enabled: true

voice:
  enabled: true
  speech_rate: 175
  volume: 0.9
  language: "en-US"
  engine: pyttsx3

database:
  path: "jarvis.db"

web:
  host: "0.0.0.0"
  port: 8080
  debug: false
  secret_key: "change-this-in-production"

api:
  host: "0.0.0.0"
  port: 5000
  debug: false
  api_key: ""  # Set this for authentication

email:
  smtp_host: ""
  smtp_port: 587
  username: ""
  password: ""
  imap_host: ""

telegram:
  token: ""

github:
  token: ""

news:
  rss_feeds:
    - "http://feeds.bbci.co.uk/news/rss.xml"
    - "https://feeds.reuters.com/reuters/topNews"

logging:
  level: "INFO"
  file: "jarvis.log"
  max_size_mb: 10
  backup_count: 5
