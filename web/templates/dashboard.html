<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis AI - Dashboard</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-theme">
<nav class="navbar">
  <div class="brand">🤖 Jarvis AI <span class="version">v2.0</span></div>
  <ul class="nav-links">
    <li><a href="/" class="active">Dashboard</a></li>
    <li><a href="/terminal">Terminal</a></li>
    <li><a href="/analytics">Analytics</a></li>
    <li><a href="/settings">Settings</a></li>
  </ul>
  <div class="status-dot" id="status-dot" title="AI Status"></div>
</nav>

<main class="container">
  <!-- Status Cards -->
  <section class="cards-grid">
    <div class="card" id="card-cpu">
      <div class="card-icon">⚡</div>
      <div class="card-value" id="cpu-val">--</div>
      <div class="card-label">CPU Usage</div>
    </div>
    <div class="card" id="card-ram">
      <div class="card-icon">🧠</div>
      <div class="card-value" id="ram-val">--</div>
      <div class="card-label">RAM Usage</div>
    </div>
    <div class="card" id="card-disk">
      <div class="card-icon">💾</div>
      <div class="card-value" id="disk-val">--</div>
      <div class="card-label">Disk Usage</div>
    </div>
    <div class="card" id="card-ai">
      <div class="card-icon">🤖</div>
      <div class="card-value" id="ai-val">--</div>
      <div class="card-label">AI Status</div>
    </div>
  </section>

  <!-- Chat Interface -->
  <section class="chat-section">
    <h2>💬 Chat with Jarvis</h2>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Ask Jarvis anything..." autocomplete="off">
      <button id="chat-send" onclick="sendChat()">Send</button>
    </div>
  </section>

  <!-- Process Monitor -->
  <section class="process-section">
    <h2>🔍 Top Processes</h2>
    <table id="process-table">
      <thead><tr><th>PID</th><th>Name</th><th>CPU%</th><th>RAM%</th></tr></thead>
      <tbody id="process-tbody"></tbody>
    </table>
  </section>
</main>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
