<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis AI - Settings</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-theme">
<nav class="navbar">
  <div class="brand">🤖 Jarvis AI <span class="version">v2.0</span></div>
  <ul class="nav-links">
    <li><a href="/">Dashboard</a></li>
    <li><a href="/terminal">Terminal</a></li>
    <li><a href="/analytics">Analytics</a></li>
    <li><a href="/settings" class="active">Settings</a></li>
  </ul>
</nav>
<main class="container">
  <h2>⚙️ Settings</h2>
  <form id="settings-form">
    <div class="setting-group">
      <label>Theme</label>
      <select name="theme" id="theme-select">
        <option value="dark">Dark (Iron Man)</option>
        <option value="light">Light</option>
        <option value="matrix">Matrix</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Voice Personality</label>
      <select name="personality">
        <option value="jarvis">Jarvis</option>
        <option value="friday">Friday</option>
        <option value="edith">EDITH</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Notifications</label>
      <input type="checkbox" name="desktop_notifications" id="desktop-notif">
      <label for="desktop-notif">Desktop notifications</label>
    </div>
    <button type="button" onclick="saveSettings()">💾 Save Settings</button>
  </form>

  <h3>Current Preferences</h3>
  <pre id="prefs-display">{{ preferences | tojson(indent=2) }}</pre>
</main>
<script src="/static/js/settings.js"></script>
</body>
</html>
